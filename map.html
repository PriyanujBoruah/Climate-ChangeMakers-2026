<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Aetheris</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --bg-color: #0a0a0c;
            --panel-bg: rgba(20, 20, 25, 0.98);
            --text-color: #f8f9fa;
            --accent: #00d2ff;
            --predict-color: #ff4757;
            --anomaly-color: #fbc531;
            --border: rgba(255,255,255,0.1);
        }

        body, html {
            margin: 0; padding: 0; height: 100vh;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden;
            display: flex; flex-direction: column;
        }

        /* ========================================= */
        /*              TOP NAVIGATION               */
        /* ========================================= */
        #top-bar {
            background: var(--panel-bg);
            border-bottom: 1px solid var(--border);
            display: flex; flex-direction: column;
            padding: 10px 20px;
            z-index: 2000;
            gap: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.6);
        }

        /* Row 1: Brand & Core Selectors */
        .top-row {
            display: flex; align-items: center; justify-content: space-between; gap: 15px;
        }

        .brand h2 {
            margin: 0; font-size: 1.1rem; color: var(--accent);
            letter-spacing: 1.5px; text-transform: uppercase; white-space: nowrap;
        }

        .selectors-container {
            display: flex; gap: 8px; flex-grow: 1; justify-content: flex-end;
        }

        /* Row 2: Lens Filter & Legend */
        .bottom-row {
            display: flex; align-items: center; justify-content: space-between; gap: 20px;
        }

        /* UI Elements */
        select {
            background: #2d2d35; color: white; border: 1px solid #444;
            padding: 8px 12px; border-radius: 6px; outline: none;
            cursor: pointer; font-size: 0.9rem; font-weight: bold;
            transition: border 0.2s;
        }
        select:hover { border-color: var(--accent); }

        .filter-group { display: flex; align-items: center; gap: 8px; }
        .filter-group label { font-size: 0.8rem; font-weight: 800; color: #888; letter-spacing: 1px; }

        /* Legend Component */
        #legend { display: flex; flex-direction: column; align-items: flex-end; flex-grow: 1; }
        #legend-title { 
            font-size: 0.7rem; font-weight: bold; margin-bottom: 4px; 
            color: #aaa; text-transform: uppercase; letter-spacing: 1px;
        }
        .gradient-bar { height: 8px; width: 100%; max-width: 350px; border-radius: 4px; transition: filter 0.3s; }
        .legend-labels { 
            display: flex; justify-content: space-between; width: 100%; 
            max-width: 350px; margin-top: 4px; font-size: 0.65rem; color: #777; font-weight: bold;
        }

        /* ========================================= */
        /*                MAP GRID                   */
        /* ========================================= */
        #map-grid {
            display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr;
            flex-grow: 1; gap: 2px; background: #1a1a1e; overflow-y: auto; overflow-x: hidden;
        }

        .map-container { position: relative; width: 100%; height: 100%; background: #000; min-height: 300px; }
        .map-div { width: 100%; height: 100%; }

        /* HUD Labels */
        .map-label {
            position: absolute; top: 15px; left: 15px; background: rgba(0, 0, 0, 0.85);
            color: white; padding: 8px 14px; border-radius: 6px; font-size: 0.95rem;
            font-weight: bold; z-index: 1000; border: 1px solid var(--border);
            text-transform: uppercase; letter-spacing: 0.5px; pointer-events: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
        }

        .label-highlight { color: var(--accent); margin-left: 5px; }
        .anomaly-label { border-left: 4px solid var(--anomaly-color); color: var(--anomaly-color); }
        .prediction-label { border-left: 4px solid var(--predict-color); color: var(--predict-color); }

        /* ========================================= */
        /*           VISUAL ANALYTICS ENGINE         */
        /* ========================================= */
        
        /* Anomaly: Calculates visual pixel difference between 10 years */
        .anomaly-mode { mix-blend-mode: difference; filter: contrast(180%) brightness(1.4); }
        
        /* Projection: Visually amplifies current data to project 2030 trends */
        .projection-mode { filter: saturate(350%) contrast(130%) brightness(1.1); }

        /* Lens Filters (Global Body state) */
        body[data-filter="invert"] .nasa-data-layer, 
        body[data-filter="invert"] #legend-gradient { filter: invert(100%); }
        
        body[data-filter="grayscale"] .nasa-data-layer, 
        body[data-filter="grayscale"] #legend-gradient { filter: grayscale(100%); }

        /* ========================================= */
        /*             MOBILE RESPONSIVENESS         */
        /* ========================================= */
        @media (max-width: 850px) {
            #top-bar { padding: 12px; gap: 10px; }
            .brand { display: none; } /* Hide text logo on mobile to make room */

            /* Selectors Row */
            .selectors-container { width: 100%; gap: 4px; }
            .selectors-container select { 
                flex: 1; font-size: 16px; /* Prevents iOS Zoom */
                padding: 12px 5px; 
            }

            /* Lens & Legend Row */
            .bottom-row { width: 100%; justify-content: space-between; }
            .filter-group { flex-shrink: 0; }
            .filter-group select { width: 100px; font-size: 14px; }
            
            #legend { align-items: flex-end; max-width: 60%; }

            /* Vertical Map Feed */
            #map-grid {
                grid-template-columns: 1fr;
                grid-template-rows: repeat(4, 46vh); 
                padding: 10px; gap: 15px;
            }
            .map-container { border-radius: 12px; border: 1px solid var(--border); }
            .map-label { font-size: 0.8rem; top: 10px; left: 10px; }
        }
    </style>
</head>
<body data-filter="none">

    <nav id="top-bar">
        <!-- Row 1: The Core Controls -->
        <div class="top-row">
            <div class="brand"><h2>AETHERIS: Snow & Heat Forecasting <span style="font-size: small; font-weight: normal;">By Saanvi Boruah & Priyanuj Boruah</span></h2></div>
            <div class="selectors-container">
                <select id="mode-select" title="Change Tracking Mode">
                    <option value="temp">🌡️ Temp Mode</option>
                    <option value="snow">❄️ Snow Mode</option>
                </select>
                <select id="month-select" title="Select Month">
                    <option value="01">JAN</option><option value="02">FEB</option>
                    <option value="03">MAR</option><option value="04">APR</option>
                    <option value="05">MAY</option><option value="06">JUN</option>
                    <option value="07" selected>JUL</option><option value="08">AUG</option>
                    <option value="09">SEP</option><option value="10">OCT</option>
                    <option value="11">NOV</option><option value="12">DEC</option>
                </select>
                <select id="year-select" title="Select Base Year"></select>
            </div>
        </div>
        
        <!-- Row 2: Analysis Tools & Legend -->
        <div class="bottom-row">
            <div class="filter-group">
                <label>LENS:</label>
                <select id="filter-select">
                    <option value="none">Normal</option>
                    <option value="invert">Invert</option>
                    <option value="grayscale">Grayscale</option>
                </select>
            </div>
            <div id="legend">
                <div id="legend-title">Loading Analytics...</div>
                <div class="gradient-bar" id="legend-gradient"></div>
                <div class="legend-labels" id="legend-labels"></div>
            </div>
        </div>
    </nav>

    <main id="map-grid">
        <section class="map-container">
            <div id="label-0" class="map-label">Observed: <span class="label-highlight" id="year-val-0"></span></div>
            <div id="map-0" class="map-div"></div>
        </section>
        <section class="map-container">
            <div id="label-1" class="map-label">Historical: <span class="label-highlight" id="year-val-1"></span></div>
            <div id="map-1" class="map-div"></div>
        </section>
        <section class="map-container">
            <div id="label-2" class="map-label anomaly-label">10-Year Anomaly</div>
            <div id="map-2" class="map-div"></div>
        </section>
        <section class="map-container">
            <div id="label-3" class="map-label prediction-label">2030 Projection</div>
            <div id="map-3" class="map-div"></div>
        </section>
    </main>

    <!-- Leaflet JS Library -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        // 1. DATA CONFIGURATION
        const datasets = {
            temp: {
                id: 'MODIS_Terra_Land_Surface_Temp_Day',
                matrix: 'GoogleMapsCompatible_Level7',
                maxNativeZoom: 7,
                title: 'Land Surface Temp Trend',
                gradient: 'linear-gradient(to right, #0000ff, #00ffff, #00ff00, #ffff00, #ff0000)',
                labels: ['-25°C', '10°C', '45°C'],
                opacity: 0.7
            },
            snow: {
                id: 'MODIS_Terra_NDSI_Snow_Cover',
                matrix: 'GoogleMapsCompatible_Level8',
                maxNativeZoom: 8,
                title: 'Snow & Ice Coverage Trend',
                gradient: 'linear-gradient(to right, #004d40, #00bfa5, #ffffff)',
                labels: ['0%', '50%', '100%'],
                opacity: 0.9
            }
        };

        const mapInstances = [];
        const activeLayers = [[], [], [], []]; 

        // 2. INITIALIZE 4 SYNCHRONIZED MAPS
        for (let i = 0; i < 4; i++) {
            const m = L.map(`map-${i}`, { 
                center: [30, -30], 
                zoom: 3, 
                maxZoom: 8, 
                zoomControl: (i === 0 && window.innerWidth > 850) // Only show zoom on desktop top-left
            });

            // Use Dark Basemap for high contrast analytics
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                attribution: i === 3 ? 'NASA GIBS' : ''
            }).addTo(m);

            mapInstances.push(m);
        }

        // VIEWPORT SYNC ENGINE
        let isSyncing = false;
        mapInstances.forEach(map => {
            map.on('move', function () {
                if (isSyncing) return;
                isSyncing = true;
                const center = this.getCenter(); const zoom = this.getZoom();
                mapInstances.forEach(otherMap => { 
                    if (otherMap !== this) otherMap.setView(center, zoom, { animate: false }); 
                });
                isSyncing = false;
            });
        });

        // Ensure tiles render correctly on mobile rotation
        window.addEventListener('resize', () => { 
            mapInstances.forEach(map => map.invalidateSize()); 
        });

        // 3. DYNAMIC YEAR GENERATION
        const yearSelect = document.getElementById('year-select');
        const currentYear = new Date().getFullYear();
        // MODIS data available from ~2000; ensure base year allows for 10-year historical lookback
        for (let y = currentYear - 1; y >= 2012; y--) {
            let opt = document.createElement('option'); opt.value = y; opt.text = `Base: ${y}`;
            yearSelect.appendChild(opt);
        }

        // 4. NASA DATA LAYER ENGINE
        function clearPanelLayers(idx) {
            activeLayers[idx].forEach(layer => mapInstances[idx].removeLayer(layer));
            activeLayers[idx] = [];
        }

        function createNASALayer(date, config, cssClass = "") {
            const url = `https://gibs.earthdata.nasa.gov/wmts/epsg3857/best/${config.id}/default/${date}/${config.matrix}/{z}/{y}/{x}.png`;
            return L.tileLayer(url, {
                tileSize: 256, opacity: config.opacity, maxNativeZoom: config.maxNativeZoom,
                className: `nasa-data-layer ${cssClass}`, 
                errorTileUrl: 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII='
            });
        }

        // 5. CORE UPDATE LOGIC
        function updateAnalytics() {
            const mode = document.getElementById('mode-select').value;
            const month = document.getElementById('month-select').value;
            const baseYear = parseInt(yearSelect.value);
            const historicalYear = baseYear - 10;
            const config = datasets[mode];

            // UI Label Updates
            document.getElementById('legend-title').innerText = config.title;
            document.getElementById('legend-gradient').style.background = config.gradient;
            document.getElementById('legend-labels').innerHTML = config.labels.map(l => `<span>${l}</span>`).join('');
            document.getElementById('year-val-0').innerText = baseYear;
            document.getElementById('year-val-1').innerText = historicalYear;

            // Update Panel 0: Observed
            clearPanelLayers(0);
            const l0 = createNASALayer(`${baseYear}-${month}-01`, config);
            l0.addTo(mapInstances[0]); activeLayers[0].push(l0);

            // Update Panel 1: Historical
            clearPanelLayers(1);
            const l1 = createNASALayer(`${historicalYear}-${month}-01`, config);
            l1.addTo(mapInstances[1]); activeLayers[1].push(l1);
            
            // Update Panel 2: Anomaly Engine (Stacks both years with CSS difference blend)
            clearPanelLayers(2);
            const a_hist = createNASALayer(`${historicalYear}-${month}-01`, config);
            const a_base = createNASALayer(`${baseYear}-${month}-01`, config, "anomaly-mode");
            a_hist.addTo(mapInstances[2]); a_base.addTo(mapInstances[2]);
            activeLayers[2].push(a_hist, a_base);

            // Update Panel 3: 2030 Trend Projection
            clearPanelLayers(3);
            const projection = createNASALayer(`${baseYear}-${month}-01`, config, "projection-mode");
            projection.addTo(mapInstances[3]); activeLayers[3].push(projection);
        }

        // 6. EVENT LISTENERS
        [yearSelect, document.getElementById('month-select'), document.getElementById('mode-select')].forEach(el => {
            el.addEventListener('change', updateAnalytics);
        });

        document.getElementById('filter-select').addEventListener('change', (e) => { 
            document.body.setAttribute('data-filter', e.target.value); 
        });

        // Initialize Application
        updateAnalytics();
    </script>
</body>
</html>
